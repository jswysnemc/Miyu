<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miyu Web Agent Console</title>

  <!-- 第三方类库 CDN，支持离线降级 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
  <link rel="stylesheet" id="hljsLightTheme" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <link rel="stylesheet" id="hljsDarkTheme" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" disabled>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- 样式文件导入 -->
  <link rel="stylesheet" href="/assets/styles/tokens.css">
  <link rel="stylesheet" href="/assets/styles/layout.css">
  <link rel="stylesheet" href="/assets/styles/sidebar.css">
  <link rel="stylesheet" href="/assets/styles/chat.css">
  <link rel="stylesheet" href="/assets/styles/markdown.css">
  <link rel="stylesheet" href="/assets/styles/tools.css">
  <link rel="stylesheet" href="/assets/styles/composer.css">
  <link rel="stylesheet" href="/assets/styles/inspector.css">
  <link rel="stylesheet" href="/assets/styles/settings.css">
  <link rel="stylesheet" href="/assets/styles/overlays.css">
  <link rel="stylesheet" href="/assets/styles/responsive.css">
  <link rel="stylesheet" href="/assets/styles/toast.css">
  <link rel="stylesheet" href="/assets/styles/custom-select.css">
  <link rel="stylesheet" href="/assets/styles/tag-editor.css">
  <link rel="stylesheet" href="/assets/styles/diff.css">
  <link rel="stylesheet" href="/assets/styles/terminal.css">
</head>
<body>
  <div class="app-layout">

    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ============ 左侧会话工作区 ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark" aria-hidden="true">M</span>
        <div class="brand-text">
          <strong>Miyu Web</strong>
          <span>Agent Console</span>
        </div>
      </div>

      <button class="primary-action" id="newSessionBtn">
        <span data-icon="plus"></span>
        <span>新建会话</span>
      </button>

      <div class="sidebar-search">
        <span class="search-icon" data-icon="search"></span>
        <input type="text" id="sessionSearchInput" placeholder="搜索会话记录" autocomplete="off">
      </div>

      <div class="sidebar-header">
        <h2>会话列表</h2>
        <div class="sidebar-actions">
          <button class="icon-action" id="toggleMultiSelectBtn" title="多选批量处理" data-icon="check"></button>
        </div>
      </div>

      <div class="multi-select-bar" id="multiSelectBar">
        <div class="ms-row-top">
          <span class="ms-count" id="msCount">已选 0 项</span>
          <div class="ms-actions-right">
            <button class="ms-btn" id="msSelectAllBtn">全选</button>
            <button class="ms-btn" id="msCancelBtn">取消</button>
          </div>
        </div>
        <div class="ms-row-bottom">
          <button class="ms-btn danger" id="msDeleteBtn">批量删除</button>
        </div>
      </div>

      <div class="session-list" id="sessionList"></div>
    </aside>

    <!-- ============ 主交互与对话专区 ============ -->
    <main class="main-content">
      <header class="top-nav">
        <div class="nav-left">
          <button class="icon-button mobile-only" id="sidebarToggleBtn" title="展开侧边栏" data-icon="menu"></button>
          <button class="icon-button" id="sidebarHideBtn" title="折叠侧边栏" data-icon="sidebar"></button>
          <div class="topbar-title">
            <span id="activeSessionTitle">当前对谈</span>
            <small id="connectionState">本地引擎运行中</small>
          </div>
        </div>
        <div class="nav-right">
          <!-- 模式选择挂载点（由 js 自研 CustomSelect 挂载，彻底取替 HTML 原生 select） -->
          <div id="modeSelectWrap"></div>
          <button class="icon-button" id="themeToggleBtn" title="视觉模式切替" data-icon="moon"></button>
          <button class="icon-button" id="inspectorToggleBtn" title="系统监控侧栏" data-icon="panelRight"></button>
          <button class="ghost-button" id="settingsBtn">配置中心</button>
        </div>
      </header>

      <section class="chat-container" id="chatContainer">
        <div class="chat-inner" id="chatInner">
          <div class="welcome" id="welcome">
            <div class="welcome-mark">M</div>
            <h1>Miyu Local Agent Console</h1>
            <p>已接入智能交互系统。请在下方输入工作任务指令，开启自动化开发与系统调度。</p>
          </div>
        </div>
        <button class="scroll-down-btn" id="scrollDownBtn" title="跳至最新消息" data-icon="arrowDown"></button>
      </section>

      <section class="input-area">
        <form class="input-pill" id="composer">
          <div class="attachment-strip" id="attachmentStrip" hidden></div>
          <textarea id="messageInput" rows="1" placeholder="输入工作指令，Enter 发送，Shift+Enter 换行..." autofocus></textarea>
          <div class="pill-bottom">
            <div class="pill-controls">
              <!-- 思考等级选择挂载点（使用自研 CustomSelect 替换原生 select） -->
              <div id="thinkingSelectWrap"></div>
            </div>
            <div class="action-group">
              <label class="file-button" title="附加图片文件">
                <input type="file" id="imageInput" accept="image/*">
                <span data-icon="image"></span>
              </label>
              <button type="submit" class="send-button" id="sendBtn" title="立刻发送">
                <span class="send-icon" data-icon="send"></span>
                <span class="stop-icon" data-icon="stop"></span>
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <!-- ============ 右侧系统健康度与任务检查器 ============ -->
    <aside class="inspector" id="inspector">
      <div class="inspector-header">
        <h2>系统监控面板</h2>
        <button class="icon-button" id="inspectorCloseBtn" title="收起面板" data-icon="close"></button>
      </div>
      <div class="inspector-body">
        <section class="inspector-card">
          <div class="card-heading">
            <h3>通道网关 (Gateways)</h3>
            <button class="link-button" id="refreshGatewaysBtn">更新数据</button>
          </div>
          <div class="gateway-list" id="gatewayList"></div>
        </section>
        <section class="inspector-card">
          <div class="card-heading">
            <h3>后台并发命令 (Background Tasks)</h3>
            <button class="link-button" id="refreshTasksBtn">更新列表</button>
          </div>
          <div class="task-list" id="taskList"></div>
        </section>
      </div>
    </aside>

    <!-- ============ Codex Desktop 级全屏设置控制台视图 ============ -->
    <div class="settings-workspace" id="settingsWorkspace">
      <div class="settings-ws-header">
        <div class="ws-title">
          <span class="brand-mark">S</span>
          <div>
            <h2>系统配置工作中心 (Settings Console)</h2>
            <p>全局推理提供商管理、自动化工具执行控制与通信渠道网关设置</p>
          </div>
        </div>
        <div class="ws-actions">
          <button class="ghost-button" id="reloadConfigBtn">重新载入</button>
          <button class="send-button" id="saveConfigBtn">保存配置更新</button>
          <button class="icon-button" id="closeSettingsBtn" title="退出配置中心" data-icon="close"></button>
        </div>
      </div>
      <div class="settings-ws-body">
        <nav class="settings-nav">
          <button type="button" class="nav-item active" data-tab="providers">模型与提供商</button>
          <button type="button" class="nav-item" data-tab="tools">系统工具权限</button>
          <button type="button" class="nav-item" data-tab="gateways">通信渠道网关</button>
        </nav>
        <div class="settings-content-area">
          <div class="settings-pane active" id="settingsProviders"></div>
          <div class="settings-pane" id="settingsTools"></div>
          <div class="settings-pane" id="settingsGateways"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ============ 会话重命名浮窗 ============ -->
  <div class="modal-backdrop" id="renameModal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true">
      <h2>修改会话名称</h2>
      <input type="text" id="renameInput" placeholder="输入新的会话标题" autocomplete="off">
      <div class="modal-actions">
        <button class="ghost-button" id="cancelRenameBtn">取消</button>
        <button class="send-button" id="saveRenameBtn">确定保存</button>
      </div>
    </div>
  </div>

  <!-- ============ 图片放大灯箱 ============ -->
  <div class="img-lightbox" id="imgLightbox" hidden>
    <button class="lightbox-close" id="lightboxCloseBtn" data-icon="close"></button>
    <img id="imgLightboxImg" src="" alt="">
  </div>

  <!-- ============ Mermaid 架构图放大视图 ============ -->
  <div class="mermaid-viewer" id="mermaidViewer" hidden>
    <div class="viewer-header">
      <span class="viewer-title">架构图表全屏分析</span>
      <div class="viewer-actions">
        <button class="viewer-btn" id="mermaidZoomInBtn" data-icon="zoomIn"></button>
        <button class="viewer-btn" id="mermaidZoomOutBtn" data-icon="zoomIn"></button>
        <button class="viewer-btn" id="mermaidResetBtn" data-icon="refresh"></button>
        <button class="viewer-btn" id="mermaidCloseBtn" data-icon="close"></button>
      </div>
    </div>
    <div class="viewer-body" id="mermaidViewerBody">
      <div class="viewer-canvas" id="mermaidViewerCanvas"></div>
    </div>
  </div>

  <script type="module">
    import * as smd from "https://cdn.jsdelivr.net/npm/streaming-markdown/smd.min.js";
    window.smd = smd;
  </script>
  <script type="module" src="/assets/src/main.js"></script>
</body>
</html>
