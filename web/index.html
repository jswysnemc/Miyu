<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miyu Web</title>

  <!-- 第三方库：CDN 引入，离线时降级为纯文本 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
  <link rel="stylesheet" id="hljsLightTheme" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <link rel="stylesheet" id="hljsDarkTheme" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" disabled>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- 样式 -->
  <link rel="stylesheet" href="/assets/styles/tokens.css">
  <link rel="stylesheet" href="/assets/styles/layout.css">
  <link rel="stylesheet" href="/assets/styles/sidebar.css">
  <link rel="stylesheet" href="/assets/styles/chat.css">
  <link rel="stylesheet" href="/assets/styles/markdown.css">
  <link rel="stylesheet" href="/assets/styles/tools.css">
  <link rel="stylesheet" href="/assets/styles/composer.css">
  <link rel="stylesheet" href="/assets/styles/inspector.css">
  <link rel="stylesheet" href="/assets/styles/settings.css">
  <link rel="stylesheet" href="/assets/styles/overlays.css">
  <link rel="stylesheet" href="/assets/styles/responsive.css">
</head>
<body>
  <div class="app-layout">

    <!-- 移动端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ============ 左侧会话栏 ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark" aria-hidden="true">M</span>
        <div class="brand-text">
          <strong>Miyu Web</strong>
          <span>Agent Console</span>
        </div>
      </div>

      <button class="primary-action" id="newSessionBtn">
        <span data-icon="plus"></span>
        <span>新建会话</span>
      </button>

      <div class="sidebar-search">
        <span class="search-icon" data-icon="search"></span>
        <input type="text" id="sessionSearchInput" placeholder="搜索会话" autocomplete="off">
      </div>

      <div class="sidebar-header">
        <h2>会话</h2>
        <div class="sidebar-actions">
          <button class="icon-action" id="toggleMultiSelectBtn" title="多选" data-icon="check"></button>
        </div>
      </div>

      <div class="multi-select-bar" id="multiSelectBar">
        <div class="ms-row-top">
          <span class="ms-count" id="msCount">已选 0 项</span>
          <div class="ms-actions-right">
            <button class="ms-btn" id="msSelectAllBtn">全选</button>
            <button class="ms-btn" id="msCancelBtn">取消</button>
          </div>
        </div>
        <div class="ms-row-bottom">
          <button class="ms-btn danger" id="msDeleteBtn">删除</button>
        </div>
      </div>

      <div class="session-list" id="sessionList"></div>
    </aside>

    <!-- ============ 主内容区 ============ -->
    <main class="main-content">
      <header class="top-nav">
        <div class="nav-left">
          <button class="icon-button mobile-only" id="sidebarToggleBtn" title="切换侧边栏" data-icon="menu"></button>
          <button class="icon-button" id="sidebarHideBtn" title="隐藏侧边栏" data-icon="sidebar"></button>
          <div class="topbar-title">
            <span id="activeSessionTitle">新会话</span>
            <small id="connectionState">本地服务</small>
          </div>
        </div>
        <div class="nav-right">
          <select id="modeSelect" class="select-compact" aria-label="模式">
            <option value="yolo">YOLO</option>
            <option value="plan">PLAN</option>
          </select>
          <button class="icon-button" id="themeToggleBtn" title="切换深色模式" data-icon="moon"></button>
          <button class="icon-button" id="inspectorToggleBtn" title="网关与任务" data-icon="panelRight"></button>
          <button class="ghost-button" id="settingsBtn">配置</button>
        </div>
      </header>

      <section class="chat-container" id="chatContainer">
        <div class="chat-inner" id="chatInner">
          <div class="welcome" id="welcome">
            <div class="welcome-mark">M</div>
            <h1>Miyu Local Agent</h1>
            <p>在浏览器中使用 Miyu，配置模型、发送对话、查看工具调用与网关状态。</p>
          </div>
        </div>
        <button class="scroll-down-btn" id="scrollDownBtn" title="回到最新位置" data-icon="arrowDown"></button>
      </section>

      <section class="input-area">
        <form class="input-pill" id="composer">
          <div class="attachment-strip" id="attachmentStrip" hidden></div>
          <textarea id="messageInput" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
          <div class="pill-bottom">
            <div class="pill-controls">
              <select id="thinkingSelect" class="select-compact" aria-label="思考等级">
                <option value="">思考自动</option>
                <option value="none">none</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="xhigh">xhigh</option>
                <option value="max">max</option>
              </select>
            </div>
            <div class="action-group">
              <label class="file-button" title="上传图片">
                <input type="file" id="imageInput" accept="image/*">
                <span data-icon="image"></span>
              </label>
              <button type="submit" class="send-button" id="sendBtn" title="发送">
                <span class="send-icon" data-icon="send"></span>
                <span class="stop-icon" data-icon="stop"></span>
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <!-- ============ 右侧检查器抽屉 ============ -->
    <aside class="inspector" id="inspector">
      <div class="inspector-header">
        <h2>面板</h2>
        <button class="icon-button" id="inspectorCloseBtn" title="关闭" data-icon="close"></button>
      </div>
      <div class="inspector-body">
        <section class="inspector-card">
          <div class="card-heading">
            <h3>网关</h3>
            <button class="link-button" id="refreshGatewaysBtn">刷新</button>
          </div>
          <div class="gateway-list" id="gatewayList"></div>
        </section>
        <section class="inspector-card">
          <div class="card-heading">
            <h3>后台命令</h3>
            <button class="link-button" id="refreshTasksBtn">刷新</button>
          </div>
          <div class="task-list" id="taskList"></div>
        </section>
      </div>
    </aside>
  </div>

  <!-- ============ 设置弹窗 ============ -->
  <div class="modal-backdrop" id="settingsModal" hidden>
    <div class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <div>
          <h2 id="settingsTitle">配置</h2>
          <p>修改 provider、模型、工具和渠道配置。已存在的密钥默认以掩码显示。</p>
        </div>
        <button class="icon-button" id="closeSettingsBtn" title="关闭" data-icon="close"></button>
      </div>
      <div class="settings-body">
        <nav class="settings-tabs">
          <button class="tab-button active" data-tab="providers">模型</button>
          <button class="tab-button" data-tab="tools">工具</button>
          <button class="tab-button" data-tab="gateways">渠道</button>
        </nav>
        <div class="settings-pane active" id="settingsProviders"></div>
        <div class="settings-pane" id="settingsTools"></div>
        <div class="settings-pane" id="settingsGateways"></div>
      </div>
      <div class="settings-footer">
        <span id="settingsStatus"></span>
        <button class="ghost-button" id="reloadConfigBtn">重新载入</button>
        <button class="send-button" id="saveConfigBtn">保存配置</button>
      </div>
    </div>
  </div>

  <!-- ============ 重命名弹窗 ============ -->
  <div class="modal-backdrop" id="renameModal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true">
      <h2>重命名会话</h2>
      <input type="text" id="renameInput" placeholder="输入新的标题" autocomplete="off">
      <div class="modal-actions">
        <button class="ghost-button" id="cancelRenameBtn">取消</button>
        <button class="send-button" id="saveRenameBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- ============ 图片放大灯箱 ============ -->
  <div class="img-lightbox" id="imgLightbox" hidden>
    <button class="lightbox-close" id="lightboxCloseBtn" data-icon="close"></button>
    <img id="imgLightboxImg" src="" alt="">
  </div>

  <!-- ============ Mermaid 全屏查看器 ============ -->
  <div class="mermaid-viewer" id="mermaidViewer" hidden>
    <div class="viewer-header">
      <span class="viewer-title">图表放大视图</span>
      <div class="viewer-actions">
        <button class="viewer-btn" id="mermaidZoomInBtn" data-icon="zoomIn"></button>
        <button class="viewer-btn" id="mermaidZoomOutBtn" data-icon="zoomIn"></button>
        <button class="viewer-btn" id="mermaidResetBtn" data-icon="refresh"></button>
        <button class="viewer-btn" id="mermaidCloseBtn" data-icon="close"></button>
      </div>
    </div>
    <div class="viewer-body" id="mermaidViewerBody">
      <div class="viewer-canvas" id="mermaidViewerCanvas"></div>
    </div>
  </div>

  <script type="module">
    // streaming-markdown 用于流式增量渲染，暴露到 window 供非模块脚本调用
    import * as smd from "https://cdn.jsdelivr.net/npm/streaming-markdown/smd.min.js";
    window.smd = smd;
  </script>
  <script type="module" src="/assets/src/main.js"></script>
</body>
</html>
